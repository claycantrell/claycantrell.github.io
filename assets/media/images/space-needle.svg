<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 300" width="120" height="300">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8c0cc"/>
      <stop offset="30%" stop-color="#dde3eb"/>
      <stop offset="50%" stop-color="#f0f2f5"/>
      <stop offset="70%" stop-color="#dde3eb"/>
      <stop offset="100%" stop-color="#b8c0cc"/>
    </linearGradient>
    <linearGradient id="darksteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a929e"/>
      <stop offset="50%" stop-color="#a8b0bc"/>
      <stop offset="100%" stop-color="#8a929e"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#4FA4D4"/>
    </linearGradient>
    <linearGradient id="magnetbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D5F8A"/>
      <stop offset="40%" stop-color="#4A90C4"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </linearGradient>
  </defs>

  <!-- Magnet body shape — rounded souvenir magnet -->
  <rect x="2" y="2" width="116" height="296" rx="16" fill="url(#magnetbg)"/>
  <rect x="4" y="4" width="112" height="292" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Stars -->
  <circle cx="15" cy="25" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="95" cy="18" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="105" cy="40" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="25" cy="50" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="80" cy="30" r="1" fill="#fff" opacity="0.6"/>

  <!-- Space Needle -->
  <!-- Antenna/spire -->
  <rect x="58" y="35" width="4" height="40" fill="url(#steel)"/>
  <rect x="59" y="30" width="2" height="10" fill="#ddd"/>

  <!-- Observation deck roof -->
  <polygon points="25,78 60,68 95,78" fill="url(#darksteel)"/>
  <line x1="25" y1="78" x2="95" y2="78" stroke="#9aa" stroke-width="0.5"/>

  <!-- Observation deck -->
  <rect x="28" y="78" width="64" height="14" fill="url(#steel)"/>
  <!-- Windows -->
  <rect x="30" y="80" width="60" height="9" rx="1" fill="url(#sky)" opacity="0.8"/>
  <!-- Window dividers -->
  <line x1="40" y1="80" x2="40" y2="89" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="50" y1="80" x2="50" y2="89" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="60" y1="80" x2="60" y2="89" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="70" y1="80" x2="70" y2="89" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="80" y1="80" x2="80" y2="89" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>

  <!-- Observation deck underside -->
  <polygon points="22,92 28,92 30,100 90,100 92,92 98,92 88,105 32,105" fill="url(#darksteel)"/>

  <!-- Upper shaft -->
  <rect x="55" y="105" width="10" height="45" fill="url(#steel)"/>

  <!-- Mid-section flare -->
  <polygon points="48,150 55,150 55,155 65,155 65,150 72,150 68,158 52,158" fill="url(#darksteel)"/>

  <!-- Lower shaft -->
  <rect x="56" y="158" width="8" height="80" fill="url(#steel)"/>

  <!-- Legs -->
  <path d="M57,230 Q50,255 30,265" stroke="url(#steel)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M63,230 Q70,255 90,265" stroke="url(#steel)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M60,235 L60,268" stroke="url(#steel)" stroke-width="4"/>

  <!-- Base -->
  <ellipse cx="60" cy="268" rx="35" ry="6" fill="url(#darksteel)"/>

  <!-- SEATTLE text -->
  <text x="60" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" letter-spacing="3">SEATTLE</text>
</svg>
