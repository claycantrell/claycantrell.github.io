<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" fill="none">
  <!-- Round fridge magnet — wider/squarer proportion -->
  <defs>
    <radialGradient id="shine1" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow1" x="-20%" y="-10%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Shadow + body -->
  <circle cx="28" cy="28" r="24" fill="#e8792b" filter="url(#shadow1)"/>
  <!-- Rim highlight -->
  <circle cx="28" cy="28" r="22" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
  <!-- Glossy shine -->
  <circle cx="28" cy="28" r="24" fill="url(#shine1)"/>
  <!-- Center dome highlight -->
  <ellipse cx="24" cy="22" rx="10" ry="8" fill="#fff" opacity="0.18"/>
</svg>
